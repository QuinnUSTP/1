<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Why You're My Best Friend! 💖</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link rel="stylesheet" href="./cause.css">
    <style>
        /* Music Player Styles */
        .music-player {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 105, 180, 0.9);
            border-radius: 50px;
            padding: 15px 20px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            gap: 15px;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .music-player button {
            background: white;
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.2rem;
            transition: transform 0.3s ease;
        }

        .music-player button:hover {
            transform: scale(1.1);
        }

        .music-player input[type="range"] {
            width: 100px;
            cursor: pointer;
            accent-color: white;
        }

        .volume-label {
            color: white;
            font-size: 0.9rem;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <!-- Music Player -->
    <div class="music-player">
        <button id="playPauseBtn" title="Play/Pause">🎵</button>
        <input type="range" id="volumeSlider" min="0" max="100" value="50" title="Volume">
        <span class="volume-label" id="volumeLabel">50%</span>
    </div>
    <audio id="bgMusic" loop autoplay>
        <source src="./bgmusic.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>
    <div class="custom-cursor">
        <svg viewBox="0 0 24 24">
            <path fill="#ff69b4" d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
        </svg>
    </div>

    <div class="container">
        <h1>Happy Birthday Katrina 💖</h1>
        
        <div id="reasons-container"></div>
        
        <button class="shuffle-button">Click Here... 💕</button>
        <div class="reason-counter"></div>

        <div class="ending-section">
            <div class="teddy-hug">
                <img src="./d1.jpg" alt="Teddy Hug">
            </div>
            <div class="ending-text">You're the BESTEST ! 💖</div>
        </div>
    </div>

    <script src="cause.js">
       
    </script>

    <script>
        // Music Player Controls with Persistent State
        const bgMusic = document.getElementById('bgMusic');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const volumeSlider = document.getElementById('volumeSlider');
        const volumeLabel = document.getElementById('volumeLabel');

        // Restore music state from sessionStorage
        window.addEventListener('load', function() {
            const savedTime = sessionStorage.getItem('musicTime');
            const savedVolume = sessionStorage.getItem('musicVolume') || 50;
            const wasPlaying = sessionStorage.getItem('musicPlaying') === 'true';

            // Set volume
            bgMusic.volume = savedVolume / 100;
            volumeSlider.value = savedVolume;
            volumeLabel.textContent = savedVolume + '%';

            // Set playback position
            if (savedTime) {
                bgMusic.currentTime = parseFloat(savedTime);
            }

            // Auto-play if it was playing before, or show pause icon since autoplay is enabled
            setTimeout(function() {
                if (!bgMusic.paused) {
                    playPauseBtn.textContent = '⏸️';
                } else {
                    playPauseBtn.textContent = '🎵';
                }
            }, 100);
        });

        // Play/Pause button
        playPauseBtn.addEventListener('click', function() {
            if (bgMusic.paused) {
                bgMusic.play();
                playPauseBtn.textContent = '⏸️';
            } else {
                bgMusic.pause();
                playPauseBtn.textContent = '🎵';
            }
        });

        // Volume control
        volumeSlider.addEventListener('input', function() {
            bgMusic.volume = this.value / 100;
            volumeLabel.textContent = this.value + '%';
            sessionStorage.setItem('musicVolume', this.value);
        });

        // Save music state before leaving page
        window.addEventListener('beforeunload', function() {
            sessionStorage.setItem('musicTime', bgMusic.currentTime);
            sessionStorage.setItem('musicPlaying', !bgMusic.paused);
            sessionStorage.setItem('musicVolume', volumeSlider.value);
        });
    </script>
</body>
</html>
